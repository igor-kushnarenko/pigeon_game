<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Голубь-Сборщик • City Seeds v19.0</title>
<style>
  body { margin:0; overflow:hidden; font-family:Arial,sans-serif; background:#000; }
  canvas { display:block; outline:none; }
  #ui { position:absolute; top:15px; left:15px; color:white; z-index:100; text-shadow:2px 2px 4px rgba(0,0,0,0.8); pointer-events:none; }
  #timer { font-size:28px; font-weight:bold; }
  #score { font-size:24px; margin-top:8px; }
  #instructions { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:white; padding:15px 25px; border-radius:10px; text-align:center; font-size:16px; pointer-events:none; }
  #clickToPlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); color:#ffdd00; padding:40px 80px; border-radius:20px; font-size:32px; text-align:center; z-index:300; cursor:pointer; box-shadow:0 0 40px rgba(255,221,0,0.6); }
  #gameOver { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); color:#ffdd00; padding:40px 60px; border-radius:15px; text-align:center; display:none; z-index:200; }
  button { margin-top:20px; padding:12px 30px; font-size:18px; background:#ffdd00; color:#222; border:none; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>
<div id="ui">
  <div>Время: <span id="timer">10:00</span></div>
  <div>Монеты: <span id="score">0</span></div>
</div>
<div id="instructions">
  WASD — движение<br>
  Shift — спринт<br>
  Зажми ПРОБЕЛ — полёт<br>
  Мышь — поворот
</div>
<div id="clickToPlay">
  КЛИКНИТЕ ПО ЭКРАНУ<br>
  <span style="font-size:22px;">чтобы начать игру</span>
</div>
<div id="gameOver">
  <h1>Время вышло!</h1>
  <p>Ты собрал <span id="finalScore">0</span> монет</p>
  <button onclick="restartGame()">Играть снова</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// =============== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И КОНСТАНТЫ ===============

// Основные объекты Three.js
let scene, camera, renderer, clock, raycaster;

// Игрок (голубь) и его части
let player, wings = [], legs = [], tailFeathers = [];
let pigeonBody, pigeonHead;           // для изменения цвета при отравлении
let originalBodyColor;                // оригинальный цвет тела

// Физика движения
let velocityY = 0;
let moveVelocity = new THREE.Vector3();
let targetYaw = Math.PI;

// Состояния игры
let isFlying = false;
let isPointerLocked = false;
let gameRunning = false;
let isOrbiting = false;

// Семена
let seeds = [];
let worldRoot = null;
let worldGroups = null;

// Коллизии
let buildingBoxes = [];      // боксы зданий для коллизий
let cameraObstacles = [];    // объекты, от которых камера может отталкиваться

// Переиспользуемые временные объекты (снижаем GC в hot path)
const tmpVecForward = new THREE.Vector3();
const tmpVecRight = new THREE.Vector3();
const tmpMoveDir = new THREE.Vector3();
const tmpNewPos = new THREE.Vector3();
const tmpAxisPos = new THREE.Vector3();
const tmpPlayerXZ = new THREE.Vector3();
const tmpCollisionSize = new THREE.Vector3();
const tmpPlayerXZSize = new THREE.Vector3();
const tmpBox = new THREE.Box3();
const tmpPlayerXZBox = new THREE.Box3();

// Игровые данные
let score = 0;
let timeLeft = 600;
let slowDownEndTime = 0;     // время окончания эффекта замедления
let poisonEndTime = 0;       // время окончания эффекта отравления
let startTime = 0;
let timerId = null;

// Управление
let keys = {};
let mouseSensitivity = 0.0024;
let orbitYaw = 0;
let orbitPitch = 0;
let cameraPitch = 0.15; // начальный небольшой наклон камеры вниз


// Освещение и окружение
let sun, sunLight, ambientLight;
let stars;

// Аудио
let audioContext;
let lastFootstepTime = 0;

// =============== КОНСТАНТЫ ИГРЫ ===============

const MOVE_SPEED_GROUND = 19;     // базовая скорость по земле
const MOVE_SPEED_FLY = 29;        // скорость в полёте
const GRAVITY = 42;
const FLY_FORCE = 23;
const SPRINT_MULTIPLIER = 1.9;

const BASE_PIGEON_HEIGHT = 3.2;   // высота голубя над землёй
const BODY_TURN_LERP = 0.32;      // плавность поворота тела

// =============== КОНСТАНТЫ КАМЕРЫ ===============
const CAMERA_DISTANCE = -15.5;     // ← теперь ОТРИЦАТЕЛЬНОЕ = вид сзади!
const CAMERA_HEIGHT = 5.2;         // высота камеры над голубем
const CAMERA_PITCH_MIN = -0.05;    // ← ОГРАНИЧИЛИ наклон вниз (не провалится под землю)
const CAMERA_PITCH_MAX = 0.05;     // вверх можно почти вертикально
const CAMERA_LERP = 0.18;          // плавность
const MOUSE_SENS_PITCH = 0.0002;   // чувствительность по вертикали


const ORBIT_DISTANCE = 18;
const ORBIT_HEIGHT = 7;
const ORBIT_SENS = 0.003;
const ORBIT_PITCH_MIN = -0.35;
const ORBIT_PITCH_MAX = 0.75;

const FRICTION_GROUND = 0.87;
const FRICTION_FLY = 0.935;
const MAX_SCORE = 500;

// Параметры мира
const CITY_SIZE = 340;
const FOREST_INNER_RADIUS = 390;
const FOREST_OUTER_RADIUS = 760;

// =============== ИНИЦИАЛИЗАЦИЯ ===============

/**
 * Основная функция инициализации игры.
 * Создаёт сцену, камеру, рендерер, освещение, все объекты мира и голубя.
 */
function init() {
  clock = new THREE.Clock();
  raycaster = new THREE.Raycaster();

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x88ccff, 280, 1100);
  scene.background = new THREE.Color(0x88ccff);

  camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 1600);

  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.6));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Освещение
  ambientLight = new THREE.AmbientLight(0xffffff, 0.45);
  scene.add(ambientLight);

  sunLight = new THREE.DirectionalLight(0xffee99, 1.85);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 2048;
  sunLight.shadow.mapSize.height = 2048;
  sunLight.shadow.camera.near = 10;
  sunLight.shadow.camera.far = 1800;
  sunLight.shadow.camera.left = -650;
  sunLight.shadow.camera.right = 650;
  sunLight.shadow.camera.top = 650;
  sunLight.shadow.camera.bottom = -650;
  scene.add(sunLight);

  sun = new THREE.Mesh(
    new THREE.SphereGeometry(22, 32, 32),
    new THREE.MeshBasicMaterial({color: 0xffee44})
  );
  scene.add(sun);

  createStars();

  // Аудио контекст
  audioContext = new (window.AudioContext || window.webkitAudioContext)();

  // Земля
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.MeshLambertMaterial({color: 0x3d8a35})
  );
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Генерация мира
  createWorld();
  createPigeon();
  createSeeds();

  // События
  window.addEventListener('resize', onWindowResize);
  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);

  const canvas = renderer.domElement;
  canvas.tabIndex = 1;

  canvas.addEventListener('mousedown', e => {
    if (e.button === 0 && gameRunning) {
      canvas.requestPointerLock();
      document.getElementById('clickToPlay').style.display = 'none';
    }
    if (e.button === 2 && gameRunning) isOrbiting = true;
  });

  document.addEventListener('mouseup', e => { if (e.button === 2) isOrbiting = false; });
  document.addEventListener('pointerlockchange', () => {
    isPointerLocked = document.pointerLockElement !== null;
  });
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Клик по стартовому экрану — запускает игру
  const clickToPlayEl = document.getElementById('clickToPlay');
  clickToPlayEl.addEventListener('click', () => {
    if (gameRunning) {
      renderer.domElement.requestPointerLock();
      clickToPlayEl.style.display = 'none';
    }
  });

  startGame();
}

/**
 * Запуск/перезапуск игры.
 * Сбрасывает все игровые переменные в начальное состояние.
 */
function startGame() {
  score = 0;
  timeLeft = 600;
  slowDownEndTime = 0;
  poisonEndTime = 0;
  startTime = clock.getElapsedTime();

  player.position.set(0, 5, 40);
  targetYaw = Math.PI;
  player.rotation.y = Math.PI;
  moveVelocity.set(0,0,0);
  player.scale.set(0.5, 0.5, 0.5);

  document.getElementById('clickToPlay').style.display = 'flex';
  document.getElementById('clickToPlay').style.pointerEvents = 'auto'; // на всякий случай
  updateUI();
  gameRunning = true;
  document.getElementById('gameOver').style.display = 'none';
  renderer.domElement.focus();

  animate();
  startTimer();
}

function initWorldGroups() {
  worldRoot = new THREE.Group();
  worldRoot.name = 'worldRoot';
  worldGroups = {
    roads: new THREE.Group(),
    mountains: new THREE.Group(),
    forest: new THREE.Group(),
    city: new THREE.Group(),
    buildings: new THREE.Group()
  };

  worldGroups.roads.name = 'roads';
  worldGroups.mountains.name = 'mountains';
  worldGroups.forest.name = 'forest';
  worldGroups.city.name = 'city';
  worldGroups.buildings.name = 'buildings';

  Object.values(worldGroups).forEach(group => worldRoot.add(group));
  scene.add(worldRoot);
}

function createWorld() {
  initWorldGroups();
  createRoads();
  createMountains();
  createForest();
  createBuildings();
  createCityVegetation();
}

// =============== ГЕНЕРАЦИЯ МИРА ===============

/**
 * Создаёт дорожную сеть города (крестовая сетка).
 */
function createRoads() {
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x1f1f1f, flatShading: true });

  // Горизонтальные дороги
  for (let x = -340; x <= 340; x += 96) {
    const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 920, 1, 48), roadMat);
    road.rotation.x = -Math.PI/2;
    road.position.set(x, 0.2, 0);
    road.receiveShadow = true;
    worldGroups.roads.add(road);
  }

  // Вертикальные дороги
  for (let z = -340; z <= 340; z += 96) {
    const road = new THREE.Mesh(new THREE.PlaneGeometry(920, 16, 48, 1), roadMat);
    road.rotation.x = -Math.PI/2;
    road.position.set(0, 0.2, z);
    road.receiveShadow = true;
    worldGroups.roads.add(road);
  }
}

/**
 * Проверяет, находится ли точка на дороге (для избежания спавна объектов на дорогах).
 */
function isOnRoad(x, z) {
  const roadX = Math.abs(x % 96);
  const roadZ = Math.abs(z % 96);
  return roadX < 14 || roadZ < 14;
}

/**
 * Создаёт горы по периметру карты.
 * Горы разного размера, без снежных шапок, в 2 раза больше чем раньше.
 */
function createMountains() {
  const rockMat = new THREE.MeshLambertMaterial({color: 0x555566});
  const numMountains = 16; // в 2 раза больше

  for (let i = 0; i < numMountains; i++) {
    const angle = (i / numMountains) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
    const dist = 920 + Math.random() * 260;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;

    const radius = 85 + Math.random() * 105;
    const height = 165 + Math.random() * 195;

    const mountain = new THREE.Mesh(
      new THREE.ConeGeometry(radius, height, 5 + Math.floor(Math.random() * 4)),
      rockMat
    );

    mountain.position.set(x, height * 0.5, z);
    mountain.rotation.y = Math.random() * Math.PI * 2;
    mountain.castShadow = true;
    mountain.receiveShadow = true;
    worldGroups.mountains.add(mountain);
  }
}

/**
 * Создаёт лес вокруг города.
 * Деревья и кусты размещаются случайно (не по сетке), разных размеров.
 */
function createForest() {
  const numTrees = 320;
  const numBushes = 480;

  // Деревья
  for (let i = 0; i < numTrees; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = FOREST_INNER_RADIUS + Math.random() * (FOREST_OUTER_RADIUS - FOREST_INNER_RADIUS);
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;

    if (isOnRoad(x, z)) continue;

    const scale = 0.7 + Math.random() * 1.4; // сильная вариация размеров
    createTree(x, z, scale, true);
  }

  // Кустарники
  for (let i = 0; i < numBushes; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = FOREST_INNER_RADIUS + Math.random() * (FOREST_OUTER_RADIUS - FOREST_INNER_RADIUS) * 0.95;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;

    if (isOnRoad(x, z)) continue;

    const scale = 0.6 + Math.random() * 1.1;
    createBush(x, z, scale);
  }
}

/**
 * Создаёт небольшие парки внутри города (деревья + кусты).
 */
function createCityVegetation() {
  const numParkTrees = 22;
  const numParkBushes = 35;

  for (let i = 0; i < numParkTrees; i++) {
    const x = (Math.random() - 0.5) * (CITY_SIZE * 1.75);
    const z = (Math.random() - 0.5) * (CITY_SIZE * 1.75);
    if (isOnRoad(x, z)) continue;
    createTree(x, z, 0.55 + Math.random() * 0.45, false);
  }

  for (let i = 0; i < numParkBushes; i++) {
    const x = (Math.random() - 0.5) * (CITY_SIZE * 1.8);
    const z = (Math.random() - 0.5) * (CITY_SIZE * 1.8);
    if (isOnRoad(x, z)) continue;
    createCityBush(x, z, 0.7 + Math.random() * 0.6);
  }
}

function createCityBush(x, z, scale = 1) {
  const bush = new THREE.Mesh(
    new THREE.SphereGeometry(6.2 * scale, 7, 7),
    new THREE.MeshLambertMaterial({color: 0x1a5c1a})
  );
  bush.position.set(x, 5 * scale, z);
  bush.castShadow = false;
  bush.receiveShadow = false;
  worldGroups.city.add(bush);
}

/**
 * Создаёт обычное дерево.
 * @param {number} x - координата X
 * @param {number} z - координата Z
 * @param {number} scale - масштаб дерева (1 = среднее)
 * @param {boolean} isForest - находится ли в лесу (влияет на тени)
 */
/**
 * Создаёт дерево. ТЕНИ ОТКЛЮЧЕНЫ полностью для производительности.
 */
function createTree(x, z, scale = 1, isForest = false) {
  const trunkHeight = 17 * scale;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(3.1 * scale, 3.7 * scale, trunkHeight, 6),
    new THREE.MeshLambertMaterial({color: 0x8B5F2B})
  );
  trunk.position.set(x, trunkHeight / 2, z);
  trunk.castShadow = false;      // ← УБРАЛИ тень
  trunk.receiveShadow = false;   // ← УБРАЛИ тень
  const targetGroup = isForest ? worldGroups.forest : worldGroups.city;
  targetGroup.add(trunk);

  const leaves = new THREE.Mesh(
    new THREE.ConeGeometry(14.5 * scale, 29 * scale, 7),
    new THREE.MeshLambertMaterial({color: 0x0f6b22})
  );
  leaves.position.set(x, trunkHeight + 8 * scale, z);
  leaves.castShadow = false;     // ← УБРАЛИ тень
  leaves.receiveShadow = false;  // ← УБРАЛИ тень
  targetGroup.add(leaves);
}

/**
 * Создаёт кустарник. ТЕНИ ОТКЛЮЧЕНЫ полностью для производительности.
 */
function createBush(x, z, scale = 1) {
  const bush = new THREE.Mesh(
    new THREE.SphereGeometry(6.2 * scale, 7, 7),
    new THREE.MeshLambertMaterial({color: 0x1a5c1a})
  );
  bush.position.set(x, 5 * scale, z);
  bush.castShadow = false;       // ← УБРАЛИ тень
  bush.receiveShadow = false;    // ← УБРАЛИ тень
  worldGroups.forest.add(bush);
}


/**
 * Создаёт все здания в городе.
 */
function createBuildings() {
  buildingBoxes = [];
  cameraObstacles = [];
  const step = 60;

  for (let x = -340; x <= 340; x += step) {
    for (let z = -340; z <= 340; z += step) {
      if (Math.random() < 0.15) continue;

      if (Math.random() < 0.30) {
        createNYSkyscraper(x, z);
      } else {
        createNormalBuilding(x, z);
      }
    }
  }
}

function createNormalBuilding(x, z) {
  const h = 25 + Math.random() * 65;
  const mat = new THREE.MeshLambertMaterial({color: 0x4a4a5a + Math.random()*0x222222});
  const b = new THREE.Mesh(new THREE.BoxGeometry(24, h, 24), mat);
  b.position.set(x, h/2, z);
  b.castShadow = true;
  b.receiveShadow = true;
  worldGroups.buildings.add(b);
  buildingBoxes.push(new THREE.Box3().setFromObject(b));
  cameraObstacles.push(b);
}

function createNYSkyscraper(x, z) {
  const h = 155 + Math.random() * 95;
  const colors = [0x4A7EFF, 0x9C4EFF, 0xFF4E7A, 0x4EFFB5, 0xFFDB4E, 0xFF7A4E, 0x6B8CFF];
  const mat = new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
  const b = new THREE.Mesh(new THREE.BoxGeometry(34, h, 34), mat);
  b.position.set(x, h/2, z);
  b.castShadow = true;
  b.receiveShadow = true;
  worldGroups.buildings.add(b);
  buildingBoxes.push(new THREE.Box3().setFromObject(b));
  cameraObstacles.push(b);
}

/**
 * Создаёт звёздное небо (точки).
 */
function createStars() {
  const vertices = [];
  for (let i = 0; i < 1800; i++) {
    const x = THREE.MathUtils.randFloatSpread(2200);
    const y = THREE.MathUtils.randFloatSpread(1800) + 400;
    const z = THREE.MathUtils.randFloatSpread(2200);
    vertices.push(x, y, z);
  }
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  const material = new THREE.PointsMaterial({ color: 0xdddddd, size: 2.4, transparent: true, opacity: 0.85 });
  stars = new THREE.Points(geometry, material);
  scene.add(stars);
}

// =============== СОЗДАНИЕ ГОЛУБЯ И СЕМЯН ===============

/**
 * Создаёт модель голубя (игрока).
 */
function createPigeon() {
  player = new THREE.Group();

  const bodyMat = new THREE.MeshPhongMaterial({color: 0xaaaaaa});
  const body = new THREE.Mesh(new THREE.SphereGeometry(1.5, 24, 24), bodyMat);
  body.scale.set(1.7, 1.2, 2.3);
  body.castShadow = true;
  player.add(body);
  pigeonBody = body;
  originalBodyColor = body.material.color.clone();

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.9, 20, 20), bodyMat);
  head.position.set(0, 1.4, 2.1);
  head.castShadow = true;
  player.add(head);
  pigeonHead = head;

  // Клюв, глаза, ноги, крылья, хвост... (остальной код модели без изменений)
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.3, 1.3, 4), new THREE.MeshPhongMaterial({color:0xffaa22}));
  beak.rotation.x = Math.PI/2;
  beak.position.set(0, 1.3, 2.9);
  beak.castShadow = true;
  player.add(beak);

  const eyeMat = new THREE.MeshPhongMaterial({color:0xffffff});
  const pupilMat = new THREE.MeshPhongMaterial({color:0x111111});
  [-0.5, 0.5].forEach(x => {
    const white = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 16), eyeMat);
    white.position.set(x, 1.55, 2.65);
    white.castShadow = true;
    player.add(white);
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 12), pupilMat);
    pupil.position.set(x, 1.55, 2.78);
    pupil.castShadow = true;
    player.add(pupil);
  });

  const legMat = new THREE.MeshPhongMaterial({color:0xff8800});
  const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 4.2, 8), legMat);
  leftLeg.position.set(-0.85, -1.6, 0.9);
  leftLeg.rotation.x = 0.6;
  leftLeg.castShadow = true;
  player.add(leftLeg);
  legs.push(leftLeg);

  const rightLeg = leftLeg.clone();
  rightLeg.position.x = 0.85;
  player.add(rightLeg);
  legs.push(rightLeg);

  const wingMat = new THREE.MeshPhongMaterial({color:0x777777, side:THREE.DoubleSide});
  const leftWing = new THREE.Mesh(new THREE.PlaneGeometry(4.6, 3.1), wingMat);
  leftWing.position.set(-2.2, 0.8, 0.4);
  leftWing.rotation.y = Math.PI/2;
  leftWing.castShadow = true;
  player.add(leftWing);
  wings.push(leftWing);

  const rightWing = leftWing.clone();
  rightWing.position.x = 2.2;
  rightWing.rotation.y = -Math.PI/2;
  player.add(rightWing);
  wings.push(rightWing);

  const tailMat = new THREE.MeshPhongMaterial({color:0x555555, side:THREE.DoubleSide});
  for (let i = -2; i <= 2; i++) {
    const feather = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 2.7), tailMat);
    feather.position.set(i * 0.52, -0.35, -1.95);
    feather.rotation.x = 0.78 + i * 0.11;
    feather.rotation.y = i * 0.13;
    feather.castShadow = true;
    player.add(feather);
    tailFeathers.push(feather);
  }

  scene.add(player);
}

/**
 * Создаёт все семена на карте.
 * Количество увеличено в 2 раза, семена появляются и в лесу.
 * Отравленные зерна визуально неотличимы от обычных.
 */
/**
 * Создаёт семена. 70% — в городе (чаще), 30% — в лесу.
 * Отравленные и царские тоже распределяются по этой логике.
 */
function createSeeds() {
  seeds = [];
  const spawnMinDistance = 8.5;
  const gridCellSize = 10;
  const seedSpatialIndex = new Map();

  const totalRegular = Math.floor(Math.random() * 301) + 650;
  const numTsar = Math.floor(Math.random() * 5) + 3;
  const numToxic = Math.floor(Math.random() * 6) + 3;

  const seedMat = new THREE.MeshPhongMaterial({color: 0xffee33});

  function createSeedMesh(type) {
    let size = 0.48;
    if (type === 'tsar') size *= 3;
    return new THREE.Mesh(new THREE.IcosahedronGeometry(size, 1), seedMat);
  }

  function placeSeed(s, type) {
    let attempts = 0, x, z, y = 2;
    do {
      // 70% шанс спавна в городе (меньшая область)
      if (Math.random() < 0.70) {
        x = (Math.random() - 0.5) * 720;   // город + небольшая зона вокруг
        z = (Math.random() - 0.5) * 720;
      } else {
        // 30% — в лесу
        const angle = Math.random() * Math.PI * 2;
        const dist = 420 + Math.random() * 520;
        x = Math.cos(angle) * dist;
        z = Math.sin(angle) * dist;
      }
      attempts++;
    } while (isTooCloseToOtherSeeds(x, z, seedSpatialIndex, gridCellSize, spawnMinDistance) && attempts < 40);

    // Иногда на крышах
    if (Math.random() < 0.28 && buildingBoxes.length) {
      const b = buildingBoxes[Math.floor(Math.random() * buildingBoxes.length)];
      x = (b.min.x + b.max.x) * 0.5 + (Math.random() - 0.5) * 18;
      z = (b.min.z + b.max.z) * 0.5 + (Math.random() - 0.5) * 18;
      y = b.max.y + 3;
    }

    s.position.set(x, y, z);
    s.userData = { collected: false, initialY: y, type: type };
    scene.add(s);
    seeds.push(s);
    addSeedToSpatialIndex(s, seedSpatialIndex, gridCellSize);
  }

  for (let i = 0; i < totalRegular; i++) placeSeed(createSeedMesh('regular'), 'regular');
  for (let i = 0; i < numTsar; i++) placeSeed(createSeedMesh('tsar'), 'tsar');
  for (let i = 0; i < numToxic; i++) placeSeed(createSeedMesh('toxic'), 'toxic');
}


function getSeedCellKey(x, z, cellSize) {
  const cellX = Math.floor(x / cellSize);
  const cellZ = Math.floor(z / cellSize);
  return `${cellX},${cellZ}`;
}

function addSeedToSpatialIndex(seed, spatialIndex, cellSize) {
  const key = getSeedCellKey(seed.position.x, seed.position.z, cellSize);
  if (!spatialIndex.has(key)) spatialIndex.set(key, []);
  spatialIndex.get(key).push(seed);
}

function isTooCloseToOtherSeeds(x, z, spatialIndex, cellSize, minDistance) {
  const baseCellX = Math.floor(x / cellSize);
  const baseCellZ = Math.floor(z / cellSize);

  for (let dx = -1; dx <= 1; dx++) {
    for (let dz = -1; dz <= 1; dz++) {
      const neighborKey = `${baseCellX + dx},${baseCellZ + dz}`;
      const neighborSeeds = spatialIndex.get(neighborKey);
      if (!neighborSeeds) continue;
      for (let s of neighborSeeds) {
        if (Math.hypot(s.position.x - x, s.position.z - z) < minDistance) return true;
      }
    }
  }
  return false;
}

// =============== ЗВУКИ ===============

function playFootstep() {
  if (!audioContext) return;
  const now = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(65, now);
  const gain = audioContext.createGain();
  gain.gain.setValueAtTime(0.35, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  const filter = audioContext.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 420;
  osc.connect(filter).connect(gain).connect(audioContext.destination);
  osc.start(now);
  osc.stop(now + 0.2);
}

function playEatSound() {
  if (!audioContext) return;
  const now = audioContext.currentTime;
  const osc1 = audioContext.createOscillator();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(1200, now);
  const gain1 = audioContext.createGain();
  gain1.gain.setValueAtTime(0.25, now);
  gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

  const osc2 = audioContext.createOscillator();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(180, now);
  const gain2 = audioContext.createGain();
  gain2.gain.setValueAtTime(0.18, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.08);

  osc1.connect(gain1).connect(audioContext.destination);
  osc2.connect(gain2).connect(audioContext.destination);
  osc1.start(now); osc1.stop(now + 0.15);
  osc2.start(now); osc2.stop(now + 0.1);
}

// =============== УПРАВЛЕНИЕ И ОБНОВЛЕНИЕ ===============

function onMouseMove(e) {
  if (!isPointerLocked || !gameRunning) return;

  if (isOrbiting) {
    orbitYaw -= e.movementX * ORBIT_SENS;
    orbitPitch -= e.movementY * ORBIT_SENS;
    orbitPitch = THREE.MathUtils.clamp(orbitPitch, ORBIT_PITCH_MIN, ORBIT_PITCH_MAX);
    return;
  }

  // Горизонталь — поворачивает голубя
  targetYaw -= e.movementX * mouseSensitivity;

  // Вертикаль — поворачивает камеру (pitch)
  cameraPitch -= e.movementY * MOUSE_SENS_PITCH;
  cameraPitch = THREE.MathUtils.clamp(cameraPitch, CAMERA_PITCH_MIN, CAMERA_PITCH_MAX);
}

function hasCollision(pos) {
  tmpCollisionSize.set(5 * player.scale.x, 6 * player.scale.y, 6 * player.scale.z);
  tmpBox.setFromCenterAndSize(pos, tmpCollisionSize);
  return buildingBoxes.some(b => tmpBox.intersectsBox(b));
}

/**
 * Главный цикл обновления игры.
 */
function update(delta) {
  if (!gameRunning) return;

  updateSunAndSky();
  isFlying = keys['Space'];

  handlePoisonEffect();

  player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetYaw, BODY_TURN_LERP);

  // Движение
  const forward = tmpVecForward.set(0, 0, 1).applyQuaternion(player.quaternion);
  forward.y = 0; forward.normalize();
  const right = tmpVecRight.set(1, 0, 0).applyQuaternion(player.quaternion);
  right.y = 0; right.normalize();

  const moveDir = tmpMoveDir.set(0, 0, 0);
  if (keys['KeyW']) moveDir.add(forward);
  if (keys['KeyS']) moveDir.sub(forward);
  if (keys['KeyA']) moveDir.add(right);
  if (keys['KeyD']) moveDir.sub(right);

  const speedMultiplier = 2 - (2 - 0.6667) * (score / MAX_SCORE);
  let speed = isFlying ? MOVE_SPEED_FLY * speedMultiplier : MOVE_SPEED_GROUND * speedMultiplier;
  if (!isFlying && (keys['ShiftLeft'] || keys['ShiftRight'])) speed *= SPRINT_MULTIPLIER;
  if (slowDownEndTime > clock.getElapsedTime()) speed *= 0.5;

  if (moveDir.lengthSq() > 0) {
    moveDir.normalize();
    moveVelocity.lerp(moveDir.multiplyScalar(speed), 0.26);
  } else {
    moveVelocity.multiplyScalar(isFlying ? FRICTION_FLY : FRICTION_GROUND);
  }

  // Применение движения с коллизиями
  const newPos = tmpNewPos.copy(player.position).addScaledVector(moveVelocity, delta);
  if (!hasCollision(newPos)) {
    player.position.x = newPos.x;
    player.position.z = newPos.z;
  } else {
    const nx = tmpAxisPos.copy(player.position);
    nx.x += moveVelocity.x * delta;
    if (!hasCollision(nx)) player.position.x = nx.x;
    const nz = tmpAxisPos.copy(player.position);
    nz.z += moveVelocity.z * delta;
    if (!hasCollision(nz)) player.position.z = nz.z;
  }

  // Полёт / гравитация
  if (isFlying) {
    velocityY = FLY_FORCE;
    const flap = Math.sin(clock.getElapsedTime() * 15) * 0.85;
    wings[0].rotation.z = flap;
    wings[1].rotation.z = -flap;
  } else {
    velocityY -= GRAVITY * delta;
    wings[0].rotation.z = 0.4;
    wings[1].rotation.z = -0.4;
  }

  // Применение вертикального движения
  const oldY = player.position.y;
  player.position.y += velocityY * delta;

  if (hasCollision(player.position)) {
    if (velocityY < 0) {
      let maxRoof = 0;
      buildingBoxes.forEach(b => {
        tmpPlayerXZ.set(player.position.x, 0, player.position.z);
        tmpPlayerXZSize.set(5 * player.scale.x, 1000, 6 * player.scale.z);
        const playerXZ = tmpPlayerXZBox.setFromCenterAndSize(tmpPlayerXZ, tmpPlayerXZSize);
        if (playerXZ.intersectsBox(b)) maxRoof = Math.max(maxRoof, b.max.y);
      });
      player.position.y = maxRoof + BASE_PIGEON_HEIGHT * player.scale.y;
      velocityY = 0;
    } else {
      player.position.y = oldY;
      velocityY = 0;
    }
  }

  if (player.position.y < BASE_PIGEON_HEIGHT * player.scale.y) {
    player.position.y = BASE_PIGEON_HEIGHT * player.scale.y;
    velocityY = 0;
  }

  // Анимация ног
  if (!isFlying && moveDir.lengthSq() > 0) {
    const walk = clock.getElapsedTime() * 14;
    legs[0].rotation.x = Math.sin(walk) * 1.1 + 0.6;
    legs[1].rotation.x = Math.sin(walk + Math.PI) * 1.1 + 0.6;
  } else {
    legs[0].rotation.x = 0.6;
    legs[1].rotation.x = 0.6;
  }

  // Звуки шагов
  const currentTime = clock.getElapsedTime();
  const isMovingOnGround = !isFlying && moveDir.lengthSq() > 0.1;
  if (isMovingOnGround && currentTime - lastFootstepTime > 0.28) {
    playFootstep();
    lastFootstepTime = currentTime;
  }

  // Анимация хвоста
  const tailFlap = isFlying ? Math.sin(clock.getElapsedTime() * 18) * 0.38 : 0;
  const tailWalk = (!isFlying && moveDir.lengthSq() > 0) ? Math.sin(clock.getElapsedTime() * 22) * 0.22 : 0;
  tailFeathers.forEach((f, i) => {
    f.rotation.z = tailFlap + tailWalk * ((i % 2) ? -1 : 1) * 0.7;
  });

  // Анимация семян
  seeds.forEach(s => {
    if (!s.userData.collected) {
      s.rotation.y += delta * 1.85;
      s.rotation.x = Math.sin(clock.getElapsedTime() * 2 + s.position.x) * 0.15;
      s.position.y = s.userData.initialY + Math.sin(clock.getElapsedTime() * 3 + s.position.x) * 0.12;
    }
  });

  collectSeeds();
  updateCamera();
}

/**
 * Обработка эффекта отравления (цвет + замедление).
 */
function handlePoisonEffect() {
  const now = clock.getElapsedTime();
  if (poisonEndTime > now) {
    const intensity = Math.max(0, (poisonEndTime - now) / 15);
    const greenShift = 0.4 + 0.6 * (1 - intensity);
    if (pigeonBody) pigeonBody.material.color.setRGB(greenShift, 1, greenShift);
    if (pigeonHead) pigeonHead.material.color.setRGB(greenShift, 1, greenShift);
  } else if (pigeonBody && pigeonHead) {
    pigeonBody.material.color.copy(originalBodyColor);
    pigeonHead.material.color.copy(originalBodyColor);
  }
}

/**
 * Сбор семян игроком.
 * Рост голубя + эффекты от разных типов семян.
 */
function collectSeeds() {
  for (let i = seeds.length - 1; i >= 0; i--) {
    const s = seeds[i];
    if (!s.userData.collected && player.position.distanceTo(s.position) < 4.5) {
      s.userData.collected = true;
      scene.remove(s);
      seeds.splice(i, 1);
      playEatSound();

      if (s.userData.type === 'tsar') {
        score += Math.floor(Math.random() * 26) + 5;
      } else if (s.userData.type === 'toxic') {
        score = Math.max(0, score - 15);
        slowDownEndTime = clock.getElapsedTime() + 15;
        poisonEndTime = clock.getElapsedTime() + 15;
      } else {
        score++;
      }

      // Рост голубя
      const scaleVal = 0.5 + (2 - 0.5) * (score / MAX_SCORE);
      player.scale.set(scaleVal, scaleVal, scaleVal);

      updateUI();
    }
  }
}

/**
 * ПРОСТАЯ И СТАБИЛЬНАЯ КАМЕРА
 * - Фиксированное расстояние
 * - Плавное следование без дёрганий
 * - Полная свобода вертикального взгляда мышью
 */
function updateCamera() {
  const lookAtPos = player.position.clone();
  lookAtPos.y += 4.0 * player.scale.y;

  const yaw = player.rotation.y;

  const offset = new THREE.Vector3(
    0,
    CAMERA_HEIGHT,
    CAMERA_DISTANCE          // теперь отрицательное → сзади
  );

  const euler = new THREE.Euler(cameraPitch, yaw, 0, 'YXZ');
  offset.applyEuler(euler);

  const desiredPos = player.position.clone().add(offset);

  camera.position.lerp(desiredPos, CAMERA_LERP);
  camera.lookAt(lookAtPos);
}

/**
 * Обновление положения солнца и цвета неба (день → вечер).
 */
function updateSunAndSky() {
  const progress = (clock.getElapsedTime() - startTime) / 600;
  const theta = progress * Math.PI;
  const radius = 1100;

  sun.position.set(
    radius * Math.cos(theta) * 0.82,
    radius * Math.sin(theta),
    radius * Math.sin(theta) * 0.25 - 220
  );
  sunLight.position.copy(sun.position);
  sunLight.intensity = 1.85 * Math.max(0, Math.sin(theta));
  sun.visible = sun.position.y >= 0;

  // Плавное изменение неба
  const skyColor = new THREE.Color(0x88ccff);
  let ambientInt = 0.45;
  let sunInt = 1.85;

  if (progress < 0.23) { // утро
    const t = progress / 0.23;
    skyColor.lerpColors(new THREE.Color(0x1C2A44), new THREE.Color(0x6EB8FF), t);
    ambientInt = 0.11 + t * 0.29;
    sunInt = 0.32 + t * 1.18;
  } else if (progress > 0.74) { // вечер
    const t = (progress - 0.74) / 0.26;
    skyColor.lerpColors(new THREE.Color(0xFF6A2E), new THREE.Color(0x2C1A38), t);
    ambientInt = 0.49 - t * 0.39;
    sunInt = 1.28 - t * 1.22;
  }

  scene.background = skyColor;
  scene.fog.color = skyColor;
  ambientLight.intensity = ambientInt;
  sunLight.intensity = sunInt;
}

function updateUI() {
  document.getElementById('score').textContent = score;
  const m = Math.floor(timeLeft/60);
  const s = timeLeft % 60;
  document.getElementById('timer').textContent = `${m}:${s<10?'0':''}${s}`;
}

function startTimer() {
  if (timerId !== null) {
    clearInterval(timerId);
  }

  timerId = setInterval(() => {
    if (!gameRunning) return;
    timeLeft--;
    updateUI();
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  if (timerId !== null) {
    clearInterval(timerId);
    timerId = null;
  }

  gameRunning = false;
  document.exitPointerLock();
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').style.display = 'block';
}

function disposeObjectTree(root) {
  if (!root) return;

  const materialRefs = new Map();
  root.traverse(obj => {
    if (!obj.isMesh || !obj.material) return;
    const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
    materials.forEach(mat => {
      materialRefs.set(mat.uuid, (materialRefs.get(mat.uuid) || 0) + 1);
    });
  });

  const disposeNode = (node) => {
    for (let i = node.children.length - 1; i >= 0; i--) {
      disposeNode(node.children[i]);
    }

    if (node.isMesh) {
      if (node.geometry) node.geometry.dispose();
      if (node.material) {
        const materials = Array.isArray(node.material) ? node.material : [node.material];
        materials.forEach(mat => {
          if ((materialRefs.get(mat.uuid) || 0) <= 1) {
            mat.dispose();
          }
        });
      }
    }

    if (node.parent) node.parent.remove(node);
  };

  disposeNode(root);
}

function restartGame() {
  // Очистка семян
  seeds.forEach(seed => disposeObjectTree(seed));
  seeds = [];

  // Очистка игрока и мира
  disposeObjectTree(player);
  disposeObjectTree(worldRoot);
  worldRoot = null;
  worldGroups = null;

  wings = []; legs = []; tailFeathers = [];
  buildingBoxes = []; cameraObstacles = [];

  // Пересоздание мира
  createWorld();
  createPigeon();
  createSeeds();

  startGame();
}

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);
  if (gameRunning) update(delta);
  renderer.render(scene, camera);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Запуск
init();
</script>
